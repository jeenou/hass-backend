# SaveModel mutation
mutation SaveModel {
  saveModel {
    message
  }
}

# Keep existing configured models aligned with the add-on's thermal model step.
mutation SetOptimizationTimeline {
  updateTimeLine(
    timeLineInput: {
      duration: { hours: 12, minutes: 0, seconds: 0 }
      step: { hours: 0, minutes: 15, seconds: 0 }
      start: { clockChoice: CURRENT_HOUR }
    }
  ) {
    errors {
      field
      message
    }
  }
}

# StartOptimization mutation
mutation StartOptimization {
  startOptimization
}

# JobStatus query
query JobStatus($jobId: Int!) {
  jobStatus(jobId: $jobId) {
    state
    message
  }
}

# GetJobOutcome query
query GetJobOutcome($jobId: Int!) {
  jobOutcome(jobId: $jobId) {
    __typename
    ... on WeatherForecastOutcome {
      time
      temperature
    }
    ... on OptimizationOutcome {
      time
      controlSignals {
        name
        signal
      }
    }
        ... on ElectricityPriceOutcome {
      time
      price
    }
  }
}

mutation StartWeatherForecastFetch {
  startWeatherForecastFetch
}

# StartElectricityPriceFetch mutation
mutation StartElectricityPriceFetch {
  startElectricityPriceFetch
}

